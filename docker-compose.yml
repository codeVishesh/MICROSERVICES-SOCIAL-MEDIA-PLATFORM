
version: '3.8'
services:
  service-discovery:
    build: ./service-discovery
    ports: ["8761:8761"]

  api-gateway:
    build: ./api-gateway
    ports: ["8080:8080"]
    depends_on: [service-discovery]

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672","15672:15672"]

  user-service:
    build: ./user-service
    ports: ["8081:8081"]
    depends_on: [service-discovery]

  post-service:
    build: ./post-service
    ports: ["8082:8082"]
    depends_on: [service-discovery, rabbitmq]

  notification-service:
    build: ./notification-service
    ports: ["8083:8083"]
    depends_on: [service-discovery, rabbitmq]

  chat-service:
    build: ./chat-service
    ports: ["8084:8084"]
    depends_on: [service-discovery]

  media-service:
    build: ./media-service
    ports: ["8085:8085"]
    depends_on: [service-discovery]

  analytics-service:
    build: ./analytics-service
    ports: ["8086:8086"]
    depends_on: [service-discovery]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [api-gateway]
